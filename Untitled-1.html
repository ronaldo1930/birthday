<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Saujanya 🎂</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
text-align:center;
color:white;
overflow:hidden;
background:linear-gradient(270deg,#ff758c,#ff7eb3,#6a11cb,#2575fc);
background-size:800% 800%;
animation:bgmove 12s infinite alternate;
}

@keyframes bgmove{
0%{background-position:0% 50%}
100%{background-position:100% 50%}
}

.card{
background:rgba(255,255,255,0.15);
padding:40px;
border-radius:20px;
backdrop-filter:blur(10px);
}

h1{
font-size:50px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px white}
to{text-shadow:0 0 30px pink}
}

#message{
font-size:22px;
height:40px;
margin-top:10px;
}

button{
margin:10px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
background:white;
color:#ff4081;
}

button:hover{
transform:scale(1.1);
}

/* cake */

#cake{
font-size:90px;
margin-top:20px;
}

/* balloons */

.balloon{
position:absolute;
bottom:-100px;
width:40px;
height:55px;
border-radius:50%;
animation:float 8s linear infinite;
}

@keyframes float{
from{transform:translateY(0)}
to{transform:translateY(-120vh)}
}

/* pop blast */

.pop{
position:absolute;
width:8px;
height:8px;
border-radius:50%;
animation:blast 1s linear forwards;
}

@keyframes blast{
from{
transform:scale(1);
opacity:1;
}
to{
transform:translate(var(--x),var(--y)) scale(2);
opacity:0;
}
}

</style>
</head>

<body>

<div class="card">

<h1>🎉 Happy Birthday Saujanya 🎂</h1>

<div id="message"></div>

<div id="cake">🎂</div>

<button onclick="cutCake()">Cut Cake 🎂</button>

</div>

<!-- AUTOPLAY REMO BGM -->
<audio autoplay loop>
<source src="remo_bgm.mp3" type="audio/mpeg">
</audio>

<script>

/* typing message */

const text="Saujanya, may your birthday be filled with happiness, laughter and beautiful memories 💖";
let i=0;

function typing(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,50);
}
}

typing();


/* balloons */

function createBalloon(){

let b=document.createElement("div");
b.classList.add("balloon");

b.style.left=Math.random()*100+"vw";
b.style.background="hsl("+Math.random()*360+",70%,60%)";

document.body.appendChild(b);

setTimeout(()=>{b.remove()},8000);

}

setInterval(createBalloon,600);


/* pop blast */

function popBlast(){

for(let i=0;i<80;i++){

let p=document.createElement("div");
p.classList.add("pop");

p.style.left="50%";
p.style.top="50%";

p.style.background="hsl("+Math.random()*360+",80%,60%)";

let x=(Math.random()*600-300)+"px";
let y=(Math.random()*600-300)+"px";

p.style.setProperty('--x',x);
p.style.setProperty('--y',y);

document.body.appendChild(p);

setTimeout(()=>p.remove(),1000);

}

}


/* cake cutting */

function cutCake(){

document.getElementById("cake").innerHTML="🍰";

popBlast();

}

</script>

</body>
</html>
